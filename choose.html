<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - BudgetTracker</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #0f0f1a;
            margin: 0;
        }
        .choice-container {
            display: flex;
            gap: 20px;
            animation: fadeIn 0.8s ease;
        }
        .choice-card {
            padding: 40px;
            text-align: center;
            width: 200px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(192, 132, 252, 0.2);
        }
        .choice-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-purple);
            box-shadow: 0 0 20px var(--glow-purple);
        }
        .choice-card h3 { margin-bottom: 20px; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="choice-container">
        <div class="card choice-card" onclick="location.href='login.html'">
            <span style="font-size: 3rem;">🔑</span>
            <h3 class="glow">Login</h3>
            <p style="color: #aaa; font-size: 0.9rem;">Already have an account?</p>
        </div>

        <div class="card choice-card" onclick="location.href='signup.html'">
            <span style="font-size: 3rem;">📝</span>
            <h3 class="glow">Sign Up</h3>
            <p style="color: #aaa; font-size: 0.9rem;">New to BudgetTracker?</p>
        </div>
    </div>
</body>
</html>
